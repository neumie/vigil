<!DOCTYPE html>
<html>
<head>
	<style>
		body {
			width: 280px;
			padding: 16px;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			background: #252526;
			color: #cccccc;
			margin: 0;
		}
		h1 {
			font-size: 14px;
			font-weight: 600;
			color: #007acc;
			margin: 0 0 14px 0;
		}
		label {
			display: block;
			font-size: 11px;
			color: #808080;
			margin-bottom: 4px;
		}
		input {
			width: 100%;
			padding: 6px 8px;
			background: #1e1e1e;
			border: 1px solid #3c3c3c;
			border-radius: 3px;
			color: #cccccc;
			font-size: 12px;
			outline: none;
			box-sizing: border-box;
		}
		input:focus { border-color: #007acc; }
		.status {
			margin-top: 10px;
			font-size: 11px;
			color: #6a9955;
			min-height: 16px;
		}
	</style>
</head>
<body>
	<h1>Vigil</h1>
	<label for="url">Server URL</label>
	<input type="text" id="url" placeholder="http://localhost:7474" />
	<div class="status" id="status"></div>
	<script src="popup.js"></script>
</body>
</html>
