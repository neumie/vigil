<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'"
		/>
		<title>Helm</title>
		<link rel="stylesheet" href="renderer.css" />
	</head>
	<body>
		<div id="app">
			<header id="topbar">
				<div class="topbar-left">
					<span id="conn-dot" class="conn-dot offline" aria-hidden="true"></span>
					<span class="wordmark">Helm</span>
				</div>
				<div class="topbar-right">
					<div id="tabs" role="tablist" aria-label="Terminals"></div>
					<button id="new-tab" title="New terminal (&#8984;T)" aria-label="New terminal">+</button>
				</div>
			</header>
			<div id="content">
				<aside id="left"></aside>
				<div id="divider" title="Drag to resize"></div>
				<main id="right">
					<div id="terms"></div>
					<div id="no-terms" hidden>
						<div class="no-terms-card">
							<div class="no-terms-title">No terminals open</div>
							<div class="no-terms-detail">Press <kbd>&#8984;T</kbd> or click + to open one.</div>
						</div>
					</div>
				</main>
			</div>
		</div>
		<script src="renderer.js"></script>
	</body>
</html>
