<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'"
		/>
		<title>Helm</title>
		<link rel="stylesheet" href="renderer.css" />
	</head>
	<body>
		<div id="app">
			<header id="topbar">
				<!-- Deliberately empty: traffic-light inset + drag region only. No
				     branding, no connection dot — daemon state lives in the sidebar
				     (waiting card when unreachable; silence when connected). -->
				<div class="topbar-left" aria-hidden="true"></div>
				<div class="topbar-right">
					<div id="tabs" role="tablist" aria-label="Terminals"></div>
					<button id="new-tab" title="New terminal (&#8984;T)" aria-label="New terminal">+</button>
					<div id="bg-root">
						<button
							id="bg-toggle"
							hidden
							title="Background terminals"
							aria-label="Background terminals"
							aria-haspopup="true"
							aria-expanded="false"
						>
							<svg
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
								aria-hidden="true"
							>
								<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
								<polyline points="2 12 12 17 22 12"></polyline>
								<polyline points="2 17 12 22 22 17"></polyline>
							</svg>
							<span id="bg-count" class="bg-count">0</span>
						</button>
						<div id="bg-popover" class="menu-panel menu-end" hidden role="dialog" aria-label="Background terminals">
							<div class="bg-header">Background terminals</div>
							<div id="bg-rows"></div>
						</div>
					</div>
				</div>
			</header>
			<div id="content">
				<aside id="left"></aside>
				<div id="divider" title="Drag to resize"></div>
				<main id="right">
					<div id="terms"></div>
					<div id="no-terms" hidden>
						<div class="no-terms-card">
							<div class="no-terms-title">No terminals open</div>
							<div class="no-terms-detail">Press <kbd>&#8984;T</kbd> or click + to open one.</div>
						</div>
					</div>
				</main>
			</div>
		</div>
		<script src="renderer.js"></script>
	</body>
</html>
