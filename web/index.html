<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-0: #141517;
        --bg-1: #17191c;
        --bg-2: #1e2024;
        --bg-3: #292c31;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.16);
        --text-0: #f0f1f2;
        --text-1: #d4d6da;
        --text-2: #a6a9af;
        --text-3: #797d84;
        --text-4: #585c63;
        --accent: #4c9aff;
        --accent-fill: #3b82f6;
        --accent-dim: rgba(76, 154, 255, 0.15);
        --blue: #4c9aff;
        --blue-dim: rgba(76, 154, 255, 0.16);
        --green: #4ec98a;
        --green-dim: rgba(78, 201, 138, 0.16);
        --red: #f2585b;
        --red-dim: rgba(242, 88, 91, 0.15);
        --amber: #e0b341;
        --amber-dim: rgba(224, 179, 65, 0.16);
        --radius: 10px;
        --radius-sm: 7px;
        --shadow: 0 8px 28px -10px rgba(0, 0, 0, 0.6), 0 2px 6px rgba(0, 0, 0, 0.3);
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font-sans);
        background: var(--bg-0);
        color: var(--text-1);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
      ::selection { background: var(--accent-dim); color: var(--accent); }
      @keyframes vg-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      .vg-pulse { animation: vg-pulse 1.4s ease-in-out infinite; }
      /* "AI is working" cues for running items in the sidebar. */
      @keyframes vg-spin { to { transform: rotate(360deg); } }
      .vg-spin {
        display: inline-block; width: 9px; height: 9px; vertical-align: -1px;
        border: 1.5px solid var(--accent-dim); border-top-color: var(--accent);
        border-radius: 50%; animation: vg-spin 0.8s linear infinite;
      }
      @keyframes vg-progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
      .vg-progress { position: relative; height: 2px; overflow: hidden; border-radius: 2px; background: var(--accent-dim); }
      .vg-progress::before {
        content: ''; position: absolute; top: 0; bottom: 0; left: 0; width: 25%;
        background: var(--accent); border-radius: 2px;
        animation: vg-progress 1.1s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
